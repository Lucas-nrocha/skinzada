                </div>
                <div class="campo">
                  <span>Confirmação da Senha:</span>
                  <input id="confirmacao_senha_input" type="password" placeholder="******" />
                </div>
                <button class="botao-cadastro">Cadastrar</button>
            </div>
        </div>
      </div>
    </div>  
</section>

<script src="../../js/cadastro.js"></script>
<script>
  function registrar() {
    var email = ipt_email.value;
    var senha = ipt_senha.value;
    var nome = ipt_nome_usuario.value;
    
    nomeError.innerHTML = '';
    emailError.innerHTML = '';
    senhaError.innerHTML = '';
    
    let isValid = true;
    if(!nome){
      nomeError.innerHTML += 'Insira um nome de usuario.';
      nomeError.style.color = 'red';
      isValid = false;
    }


    if(!email || !email.includes('@')){
      emailError.innerHTML += 'Insira um email válido.';
      emailError.style.color = 'red';
      isValid = false;
    }

    if (senha.length < 6) {
      senhaError.innerHTML += 'A senha deve ter pelo menos 6 caracteres.';
      senhaError.style.color = 'red';
      isValid = false;
    }

    if (isValid) {
      cadastrar();
      // window.location.href = 'login.html';
    }
  }
</script>
